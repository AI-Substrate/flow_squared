[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (may touch filesystem)
    docs: Documentation/canonical tests
    slow: Tests that take longer to run (e.g., LSP startup)
    lsp: Tests that require LSP server
addopts = -v --tb=short
